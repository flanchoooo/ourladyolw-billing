server:
  port: ${SERVER_PORT:8080}
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    key-store: ${SERVER_SSL_KEY_STORE:}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
    key-alias: ${SERVER_SSL_KEY_ALIAS:}

spring:
  application:
    name: parish-system
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:parish_system}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  billing:
    # Runs at 00:00 on the first day of every month.
    monthly-cron: "${BILLING_MONTHLY_CRON:0 0 0 1 * *}"
    time-zone: "${BILLING_TIME_ZONE:Africa/Harare}"
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me-change-me}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRY_MS:3600000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
